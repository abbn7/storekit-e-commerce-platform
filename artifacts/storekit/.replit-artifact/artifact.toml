kind = "web"
previewPath = "/"
title = "StoreKit — Fashion E-Commerce"
version = "1.0.0"
id = "artifacts/storekit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20287

[services.development]
run = "pnpm --filter @workspace/storekit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/storekit", "run", "build" ]
publicDir = "artifacts/storekit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20287"
BASE_PATH = "/"
