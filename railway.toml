[build]
# Use our multi-stage Dockerfile — do NOT let Railway auto-detect Nixpacks.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# The API server (Express) serves both the API and the built React frontend.
# Railway must NOT try to run any other package's dev/start scripts.
startCommand = "node --enable-source-maps ./dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
